appId: com.thinklish.app
productName: Thinklish
copyright: Copyright © 2026 Thinklish

directories:
  buildResources: resources
  output: dist

files:
  - out/**

asarUnpack:
  - node_modules/better-sqlite3/**

npmRebuild: true

mac:
  category: public.app-category.education
  identity: null
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64

dmg:
  artifactName: ${productName}-${version}-${os}-${arch}.${ext}

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-${version}-${os}-${arch}-setup.${ext}

# GitHub Actions 用 artifact + action-gh-release 上传；YAML 不会展开 bash 的 ${VAR:-default}，
# 若此处写 provider: github 会在打 tag 时隐式发布并生成错误的 API 路径。
# 需要本机发布到 GitHub 时：配置 package.json repository 后执行 electron-builder --publish always
publish: null
