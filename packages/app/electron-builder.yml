appId: com.thinklish.app
productName: Thinklish
copyright: Copyright © 2026 Thinklish

directories:
  buildResources: resources
  output: dist

files:
  - out/**

asarUnpack:
  - node_modules/better-sqlite3/**

npmRebuild: true

mac:
  category: public.app-category.education
  identity: null
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64

dmg:
  artifactName: ${productName}-${version}-${os}-${arch}.${ext}

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-${version}-${os}-${arch}-setup.${ext}

publish:
  provider: github
  owner: ${GH_OWNER:-chenweimin}
  repo: ${GH_REPO:-english-studio}
